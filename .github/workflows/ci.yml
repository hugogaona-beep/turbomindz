name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]

jobs:
  typecheck:
    name: Type Check + Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    defaults:
      run:
        working-directory: web

    env:
      DATABASE_URL:                          ${{ secrets.DATABASE_URL }}
      DIRECT_URL:                            ${{ secrets.DIRECT_URL }}
      NEXTAUTH_SECRET:                       ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL:                          https://turbomindz.com
      NEXT_PUBLIC_APP_URL:                   https://turbomindz.com
      NEXT_PUBLIC_ALCHEMY_ID:                ${{ secrets.NEXT_PUBLIC_ALCHEMY_ID }}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:  ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
      NEXT_PUBLIC_SUPABASE_URL:              ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY:         ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_CONTRACT_ADDRESS:          "0x0000000000000000000000000000000000000000"
      NEXT_PUBLIC_ALGOLIA_APP_ID:            placeholder
      NEXT_PUBLIC_ALGOLIA_SEARCH_KEY:        placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
